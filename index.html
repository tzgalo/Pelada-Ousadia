<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="theme-color" content="#0a0a0a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Pelada</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0a0a0a;
      --bg2:       #141414;
      --bg3:       #1e1e1e;
      --border:    #2a2a2a;
      --border2:   #383838;
      --gold:      #E8C547;
      --gold2:     #c9a82e;
      --gold-dim:  rgba(232,197,71,0.12);
      --gold-glow: rgba(232,197,71,0.25);
      --text:      #f0f0f0;
      --text2:     #999;
      --text3:     #666;
      --green:     #4caf7d;
      --red:       #e05252;
      --blue:      #5b9cf6;
      --orange:    #f0922b;
      --radius:    10px;
      --radius-lg: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; overscroll-behavior: none; }
    body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

    /* ── TOP BAR ── */
    #topbar {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; height: 56px;
    }
    #topbar .title { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 2px; color: var(--gold); }
    #topbar .user-btn {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px;
      padding: 5px 10px 5px 5px; font-size: 13px; font-weight: 600; color: var(--text);
    }
    #topbar .user-btn .avatar {
      width: 28px; height: 28px; border-radius: 50%; background: var(--gold-dim);
      border: 1px solid var(--gold); display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--gold); overflow: hidden;
    }
    #topbar .user-btn .avatar img { width: 100%; height: 100%; object-fit: cover; }

    /* ── NAV ── */
    #nav {
      position: sticky; bottom: 0; z-index: 100;
      background: var(--bg2); border-top: 1px solid var(--border);
      display: flex;
    }
    .nav-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; padding: 8px 0 10px; cursor: pointer; border: none; background: none;
      color: var(--text3); font-size: 9px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
      transition: color .2s;
    }
    .nav-btn .icon { font-size: 20px; line-height: 1; }
    .nav-btn.active { color: var(--gold); }
    .nav-btn.active .icon { filter: drop-shadow(0 0 6px var(--gold-glow)); }

    /* ── SCREENS ── */
    #screen { flex: 1; overflow-y: auto; padding-bottom: 80px; }

    /* ── CARDS ── */
    .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin: 0 12px 12px; }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 12px; }
    .section-header { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 2px; color: var(--text3); padding: 16px 16px 6px; text-transform: uppercase; }

    /* ── BUTTONS ── */
    .btn { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 13px 16px; border-radius: var(--radius); border: none; cursor: pointer; font-family: 'Bebas Neue', sans-serif; font-size: 15px; letter-spacing: 1.5px; transition: all .15s; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-gold:active { background: var(--gold2); }
    .btn-outline { background: transparent; border: 1px solid var(--border2); color: var(--text2); }
    .btn-outline:active { border-color: var(--gold); color: var(--gold); }
    .btn-red { background: var(--red); color: #fff; }
    .btn-green { background: var(--green); color: #fff; }
    .btn-ghost { background: var(--bg3); border: 1px solid var(--border2); color: var(--text); }
    .btn:disabled { opacity: .35; cursor: default; }
    .btn-sm { padding: 8px 14px; font-size: 12px; width: auto; border-radius: 8px; }

    /* ── INPUTS ── */
    .input-wrap { margin-bottom: 12px; }
    .input-wrap label { display: block; font-size: 11px; font-weight: 600; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; margin-bottom: 5px; }
    input[type=text], input[type=number], input[type=password], input[type=date], select, textarea {
      width: 100%; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius);
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; padding: 10px 12px; outline: none;
      transition: border-color .2s;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--gold); }
    select option { background: var(--bg3); }

    /* ── MODALS ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,.8);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn .2s;
    }
    .modal-box {
      background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg) var(--radius-lg) 0 0;
      width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
      padding: 20px 16px 32px; animation: slideUp .25s;
    }
    .modal-box.centered {
      border-radius: var(--radius-lg); max-width: 340px; align-self: center;
      margin: 0 16px; animation: popIn .2s;
    }
    .modal-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--gold); margin-bottom: 16px; }
    @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
    @keyframes slideUp { from { transform: translateY(60px); opacity:0 } to { transform: translateY(0); opacity:1 } }
    @keyframes popIn { from { transform: scale(.92); opacity:0 } to { transform: scale(1); opacity:1 } }

    /* ── FLOAT MENU ── */
    .float-menu {
      position: fixed; top: 56px; right: 12px; z-index: 200;
      background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius-lg);
      min-width: 190px; overflow: hidden; animation: popIn .15s;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .float-menu-item {
      display: flex; align-items: center; gap: 10px; padding: 13px 16px;
      cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text);
      border-bottom: 1px solid var(--border); transition: background .15s;
    }
    .float-menu-item:last-child { border-bottom: none; }
    .float-menu-item:active { background: var(--bg3); }
    .float-menu-item.danger { color: var(--red); }

    /* ── BADGES ── */
    .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; }
    .badge-gold { background: var(--gold-dim); color: var(--gold); border: 1px solid var(--gold); }
    .badge-red { background: rgba(224,82,82,.15); color: var(--red); border: 1px solid var(--red); }
    .badge-green { background: rgba(76,175,125,.15); color: var(--green); border: 1px solid var(--green); }
    .badge-gray { background: var(--bg3); color: var(--text3); border: 1px solid var(--border2); }
    .badge-blue { background: rgba(91,156,246,.15); color: var(--blue); border: 1px solid var(--blue); }

    /* ── DIVIDER ── */
    .divider { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

    /* ── PLAYER ROW ── */
    .player-row {
      display: flex; align-items: center; gap: 10px; padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .player-row:last-child { border-bottom: none; }
    .player-avatar {
      width: 36px; height: 36px; min-width: 36px; border-radius: 50%;
      background: var(--gold-dim); border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; color: var(--gold); overflow: hidden;
    }
    .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .player-avatar.sm { width: 28px; height: 28px; min-width: 28px; font-size: 10px; }
    .player-info { flex: 1; min-width: 0; }
    .player-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .player-sub { font-size: 11px; color: var(--text3); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      z-index: 500; background: var(--bg3); border: 1px solid var(--border2);
      color: var(--text); font-size: 13px; font-weight: 500;
      padding: 10px 20px; border-radius: 24px; white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,.5); animation: toastIn .3s;
    }
    @keyframes toastIn { from { opacity:0; transform: translateX(-50%) translateY(12px) } to { opacity:1; transform: translateX(-50%) translateY(0) } }

    /* ── STAT BOX ── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .stat-box { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px; text-align: center; }
    .stat-box .val { font-family: 'JetBrains Mono', monospace; font-size: 22px; font-weight: 700; color: var(--gold); }
    .stat-box .lbl { font-size: 9px; color: var(--text3); letter-spacing: .5px; text-transform: uppercase; margin-top: 2px; }

    /* ── LOGIN ── */
    #login-screen {
      position: fixed; inset: 0; z-index: 400;
      background: var(--bg); display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px 24px;
    }
    .login-logo { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 4px; color: var(--gold); line-height: 1; margin-bottom: 4px; }
    .login-sub { font-size: 11px; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
    .login-card { width: 100%; max-width: 360px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; }

    /* ── PRESENCE LIST ── */
    .presence-desc { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; font-size: 12px; color: var(--text2); line-height: 1.7; white-space: pre-line; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
    .presence-name { display: flex; align-items: center; gap: 6px; padding: 5px 0; font-size: 13px; }
    .presence-num { font-family: 'JetBrains Mono', monospace; color: var(--text3); font-size: 11px; min-width: 18px; }
    .espera-tag { font-size: 9px; color: var(--orange); background: rgba(240,146,43,.15); border: 1px solid var(--orange); border-radius: 4px; padding: 1px 5px; }

    /* ── TEAMS ── */
    .team-card { background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
    .team-label { font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 8px; }
    .team-player { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 12px; }

    /* ── RANKING ── */
    .rank-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
    .rank-pos { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--text3); min-width: 28px; text-align: center; }
    .rank-pos.gold { color: var(--gold); }
    .rank-pos.silver { color: #aaa; }
    .rank-pos.bronze { color: #cd7f32; }
    .rank-score { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--gold); margin-left: auto; }

    /* ── FINANCES ── */
    .debt-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .debt-row:last-child { border-bottom: none; }
    .debt-amount { font-family: 'JetBrains Mono', monospace; font-weight: 700; }

    /* ── ANNOUNCEMENT ── */
    .announce-card { background: linear-gradient(135deg, rgba(232,197,71,.08), rgba(232,197,71,.03)); border: 1px solid rgba(232,197,71,.3); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; }
    .announce-title { font-weight: 700; font-size: 13px; color: var(--gold); margin-bottom: 4px; }
    .announce-body { font-size: 12px; color: var(--text2); line-height: 1.5; }
    .announce-meta { font-size: 10px; color: var(--text3); margin-top: 6px; }

    /* ── CHECKBOX ── */
    .check-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; cursor: pointer; border-bottom: 1px solid var(--border); }
    .check-row:last-child { border-bottom: none; }
    .check-box { width: 20px; height: 20px; min-width: 20px; border-radius: 5px; border: 2px solid var(--border2); background: transparent; display: flex; align-items: center; justify-content: center; transition: all .15s; }
    .check-box.checked { background: var(--gold); border-color: var(--gold); }
    .check-box.checked::after { content: '✓'; font-size: 12px; color: #000; font-weight: 800; }

    /* ── EMOJI REACTIONS ── */
    .reactions-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .reaction-btn { display: flex; align-items: center; gap: 4px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 4px 8px; cursor: pointer; font-size: 14px; transition: all .15s; }
    .reaction-btn.mine { border-color: var(--gold); background: var(--gold-dim); }
    .reaction-btn .cnt { font-size: 11px; color: var(--text2); font-family: 'JetBrains Mono', monospace; }

    /* ── FLOW SCREENS ── */
    #flow-screen { position: fixed; inset: 0; z-index: 200; background: var(--bg); overflow-y: auto; display: none; flex-direction: column; }
    #flow-screen.open { display: flex; }
    .flow-header { display: flex; align-items: center; gap: 10px; padding: 16px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 10; }
    .flow-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--gold); }
    .flow-back { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
    .flow-content { padding: 16px; flex: 1; }

    /* ── SLIDER ── */
    input[type=range] { width: 100%; accent-color: var(--gold); }

    /* ── MISC ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 13px; }
    .gold-text { color: var(--gold); }
    .red-text { color: var(--red); }
    .green-text { color: var(--green); }
    .small { font-size: 11px; color: var(--text3); }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .bold { font-weight: 700; }
    .mt8 { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .mt16 { margin-top: 16px; }
    .flex-row { display: flex; align-items: center; gap: 8px; }
    .flex-between { display: flex; align-items: center; justify-content: space-between; }
    .w100 { width: 100%; }
    .gap8 { gap: 8px; }
    .gap12 { gap: 12px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">PELADA</div>
  <div class="login-sub">Quadra Ousadia</div>
  <div class="login-card" id="loginCard">
    <div class="input-wrap">
      <label>Seu nome</label>
      <input type="text" id="login-name" placeholder="Como te chamam..." autocomplete="off" autocapitalize="words"/>
      <div id="login-name-err" style="font-size:11px;color:var(--red);margin-top:4px;display:none"></div>
    </div>
    <div id="login-pass-wrap" style="display:none">
      <div class="input-wrap">
        <label id="login-pass-label">Senha</label>
        <input type="password" id="login-pass" placeholder="••••••"/>
        <div id="login-pass-err" style="font-size:11px;color:var(--red);margin-top:4px;display:none"></div>
      </div>
    </div>
    <button class="btn btn-gold mt8" onclick="loginStep()">ENTRAR</button>
    <button class="btn btn-outline mt8" onclick="entrarSemConta()" style="margin-top:8px">👁 VER SEM CONTA</button>
  </div>
</div>

<!-- TOP BAR -->
<div id="topbar" style="display:none">
  <div class="title">PELADA</div>
  <div class="user-btn" onclick="toggleFloatMenu()">
    <div class="avatar" id="header-avatar"></div>
    <span id="header-name">—</span>
  </div>
</div>

<!-- FLOAT MENU -->
<div class="float-menu" id="float-menu" style="display:none">
  <div class="float-menu-item" onclick="verPerfil()">👤 Ver perfil</div>
  <div class="float-menu-item" id="fm-foto" onclick="abrirUploadFoto()" style="display:none">📷 Alterar foto</div>
  <div class="float-menu-item" id="fm-senha" onclick="abrirMudarSenha()" style="display:none">🔑 Mudar senha</div>
  <div class="float-menu-item danger" onclick="sairDaConta()">↩ Sair da conta</div>
</div>

<!-- SCREEN -->
<div id="screen" style="display:none"></div>

<!-- NAV -->
<div id="nav" style="display:none">
  <button class="nav-btn active" onclick="goTab('home')" id="nav-home"><div class="icon">⚽</div>Home</button>
  <button class="nav-btn" onclick="goTab('jogadores')" id="nav-jogadores"><div class="icon">👥</div>Jogadores</button>
  <button class="nav-btn" onclick="goTab('ranking')" id="nav-ranking"><div class="icon">🏆</div>Ranking</button>
  <button class="nav-btn" onclick="goTab('financas')" id="nav-financas"><div class="icon">💰</div>Finanças</button>
  <button class="nav-btn" onclick="goTab('opcoes')" id="nav-opcoes"><div class="icon">⚙️</div>Opções</button>
</div>

<!-- FLOW SCREEN -->
<div id="flow-screen">
  <div class="flow-header">
    <div class="flow-back" onclick="fecharFlow()">←</div>
    <h2 id="flow-title">SORTEIO</h2>
  </div>
  <div class="flow-content" id="flow-content"></div>
</div>

<!-- Firebase -->
<script type="module" src="app.js?v=3"></script>
</body>
</html>
